services:
  hdfs-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: ucp_hdfs_namenode
    environment:
      CLUSTER_NAME: charity-hdfs
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:9000
    ports:
      - "9871:9870"
      - "9002:9000"
    volumes:
      - hdfs_namenode:/hadoop/dfs/name

  hdfs-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: ucp_hdfs_datanode
    depends_on:
      - hdfs-namenode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://hdfs-namenode:9000
    ports:
      - "9865:9864"
    volumes:
      - hdfs_datanode:/hadoop/dfs/data
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ucp_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ucp_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  kafka-connect:
    image: debezium/connect:2.6
    container_name: ucp_debezium_connect
    depends_on:
      - kafka
      - sqlserver
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: charity-connect-cluster
      CONFIG_STORAGE_TOPIC: charity_connect_configs
      OFFSET_STORAGE_TOPIC: charity_connect_offsets
      STATUS_STORAGE_TOPIC: charity_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ucp_sqlserver
    environment:
      MSSQL_AGENT_ENABLED: "true"
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ChangeMe_StrongPassword_2026!
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'ChangeMe_StrongPassword_2026!' -C -Q 'SELECT 1' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: ucp_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "ChangeMe_MinIO_2026!"
      MINIO_ROOT_PASSWORD: ChangeMe_MinIO_2026!
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-create-bucket:
    image: minio/mc:latest
    container_name: ucp_minio_create_bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 ChangeMe_MinIO_2026! ChangeMe_MinIO_2026!123; mc mb -p local/charity-documents; mc anonymous set download local/charity-documents; exit 0; "


  spark-master:
    image: bitnami/spark:3.5.1
    container_name: ucp_spark_master
    depends_on:
      - kafka
      - hdfs-namenode
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      HADOOP_USER_NAME: root
    ports:
      - "7077:7077"
      - "18080:8080"
    volumes:
      - ../data_engineering:/opt/bitnami/spark/data_engineering

  spark-worker:
    image: bitnami/spark:3.5.1
    container_name: ucp_spark_worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 1
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      HADOOP_USER_NAME: root
    ports:
      - "18081:8081"
    volumes:
      - ../data_engineering:/opt/bitnami/spark/data_engineering

volumes:
  sqlserver_data:
  minio_data:
  hdfs_namenode:
  hdfs_datanode:


